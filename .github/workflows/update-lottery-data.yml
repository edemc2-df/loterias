name: Atualizar bases das loterias

on:
  schedule:
    - cron: "0 10 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-data:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Baixar bases atualizadas
        run: python scripts/update_lottery_data.py

      - name: Verificar mudanças
        id: changes
        run: |
          if git diff --quiet -- loteria_app/data; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Commit e push
        if: steps.changes.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add loteria_app/data/*.xlsx
          git commit -m "chore: atualiza bases das loterias"
          git push

      - name: Sem mudanças
        if: steps.changes.outputs.changed != 'true'
        run: echo "As bases já estavam atualizadas."
